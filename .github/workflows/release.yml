name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

# Serialize releases; never cancel one in flight.
concurrency:
  group: release
  cancel-in-progress: false

# Runs after CI succeeds on main, so a broken build never starts the release
# machinery. Skips quietly when the current version has already been released.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Check Release Needed
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      last_version: ${{ steps.last_version.outputs.LAST_VERSION }}
      release_needed: ${{ steps.decide.outputs.RELEASE_NEEDED }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0

    - name: Get version from Cargo.toml
      id: version
      shell: bash
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Get last release version
      id: last_version
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        LAST=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
        LAST=${LAST#v}
        echo "LAST_VERSION=${LAST:-0.0.0}" >> "$GITHUB_OUTPUT"
        echo "Last released version: ${LAST:-none}"

    - name: Decide whether to release
      id: decide
      shell: bash
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        if [ -n "$(git tag -l "$TAG")" ]; then
          echo "RELEASE_NEEDED=false" >> "$GITHUB_OUTPUT"
          echo ":fast_forward: Tag $TAG already exists — nothing to release." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "RELEASE_NEEDED=true" >> "$GITHUB_OUTPUT"
          echo ":rocket: Tag $TAG does not exist — releasing." >> "$GITHUB_STEP_SUMMARY"
        fi

  build:
    name: Build Release Binary
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v6
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v6
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v6
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release binary
      run: cargo build --release

    - name: Upload binary artifact
      uses: actions/upload-artifact@v7
      with:
        name: release-binary
        path: target/release/wincamcfg.exe

  publish:
    name: Changelog, Tag, SBOM, and Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: main
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Update CHANGELOG.md
      shell: pwsh
      run: |
        $version = "${{ needs.prepare.outputs.version }}"
        $lastVersion = "${{ needs.prepare.outputs.last_version }}"
        $changelogPath = "CHANGELOG.md"
        $changelog = Get-Content $changelogPath -Raw

        $versionPattern = [regex]::Escape($version)
        if ($changelog -match "\[$versionPattern\]") {
          Write-Output "Version $version already in CHANGELOG.md"
          exit 0
        }

        if ($lastVersion -eq "0.0.0") {
          $gitLog = git log --oneline --pretty="- %s" -- src/ Cargo.toml build.rs
        } else {
          $gitLog = git log "v$lastVersion..HEAD" --oneline --pretty="- %s" -- src/ Cargo.toml build.rs
        }

        $today = Get-Date -Format "yyyy-MM-dd"
        $newEntry = "## [$version] - $today`n`n### Changed`n$gitLog`n"

        $lines = $changelog -split "`n"
        $insertIndex = 0
        for ($i = 0; $i -lt $lines.Count; $i++) {
          if ($lines[$i] -match "^## \[") {
            $insertIndex = $i
            break
          }
        }

        $updatedChangelog = (($lines[0..($insertIndex - 1)] | Join-String -Separator "`n")) + "`n$newEntry" + (($lines[$insertIndex..($lines.Count - 1)] | Join-String -Separator "`n"))
        Set-Content $changelogPath $updatedChangelog -Encoding UTF8

        Write-Output "Updated CHANGELOG.md with version $version"

    - name: Commit and push changelog
      shell: pwsh
      run: |
        if (git diff --quiet) {
          Write-Output "No changelog changes to commit"
        } else {
          git add CHANGELOG.md
          git commit -m "docs: update changelog for v${{ needs.prepare.outputs.version }}"
          git push origin HEAD:main
        }

    - name: Create and push git tag
      run: |
        git tag -a v${{ needs.prepare.outputs.version }} -m "Release v${{ needs.prepare.outputs.version }}"
        git push origin v${{ needs.prepare.outputs.version }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v6
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-sbom
      run: cargo install cargo-sbom --locked

    - name: Generate SBOM (SPDX)
      run: cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json

    - name: Generate SBOM (CycloneDX)
      run: cargo sbom --output-format cyclone_dx_json_1_6 > sbom.cyclonedx.json

    - name: Download binary artifact
      uses: actions/download-artifact@v8
      with:
        name: release-binary

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: 'wincamcfg.exe'

    - name: Generate SPDX SBOM attestation
      uses: actions/attest-sbom@v4
      with:
        subject-path: 'wincamcfg.exe'
        sbom-path: 'sbom.spdx.json'

    - name: Generate CycloneDX SBOM attestation
      uses: actions/attest-sbom@v4
      with:
        subject-path: 'wincamcfg.exe'
        sbom-path: 'sbom.cyclonedx.json'

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ needs.prepare.outputs.version }}
        draft: false
        prerelease: false
        files: |
          wincamcfg.exe
          sbom.spdx.json
          sbom.cyclonedx.json
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
