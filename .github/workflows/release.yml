name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

# Serialize releases; never cancel one in flight.
concurrency:
  group: release
  cancel-in-progress: false

# Runs after CI succeeds on main, so a broken build never starts the release
# machinery. Skips quietly when the current version has already been released.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Check Release Needed
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      release_needed: ${{ steps.decide.outputs.RELEASE_NEEDED }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0

    - name: Get version from Cargo.toml
      id: version
      shell: bash
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Decide whether to release
      id: decide
      shell: bash
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        if [ -n "$(git tag -l "$TAG")" ]; then
          echo "RELEASE_NEEDED=false" >> "$GITHUB_OUTPUT"
          echo ":fast_forward: Tag $TAG already exists — nothing to release." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "RELEASE_NEEDED=true" >> "$GITHUB_OUTPUT"
          echo ":rocket: Tag $TAG does not exist — releasing." >> "$GITHUB_STEP_SUMMARY"
        fi

  build:
    name: Build Release Binary
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v6
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v6
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v6
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release binary
      run: cargo build --release

    - name: Upload binary artifact
      uses: actions/upload-artifact@v7
      with:
        name: release-binary
        path: target/release/wincamcfg.exe

  publish:
    name: Tag, SBOM, and Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
    # CHANGELOG.md is maintained in the PR that bumps the version (branch
    # protection on main rejects direct pushes from the workflow token).
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create and push git tag
      run: |
        git tag -a v${{ needs.prepare.outputs.version }} -m "Release v${{ needs.prepare.outputs.version }}"
        git push origin v${{ needs.prepare.outputs.version }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v6
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-sbom
      run: cargo install cargo-sbom --locked

    - name: Generate SBOM (SPDX)
      run: cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json

    - name: Generate SBOM (CycloneDX)
      run: cargo sbom --output-format cyclone_dx_json_1_6 > sbom.cyclonedx.json

    - name: Download binary artifact
      uses: actions/download-artifact@v8
      with:
        name: release-binary

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: 'wincamcfg.exe'

    - name: Generate SPDX SBOM attestation
      uses: actions/attest-sbom@v4
      with:
        subject-path: 'wincamcfg.exe'
        sbom-path: 'sbom.spdx.json'

    - name: Generate CycloneDX SBOM attestation
      uses: actions/attest-sbom@v4
      with:
        subject-path: 'wincamcfg.exe'
        sbom-path: 'sbom.cyclonedx.json'

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ needs.prepare.outputs.version }}
        draft: false
        prerelease: false
        files: |
          wincamcfg.exe
          sbom.spdx.json
          sbom.cyclonedx.json
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
